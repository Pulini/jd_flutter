<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书二维码登录</title>
    <script src="https://lf-package-cn.feishucdn.com/obj/feishu-static/lark/passport/qrcode/LarkSSOSDKWebQRCode-1.0.3.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        #qrcode-container {
            width: 250px;
            height: 250px;
            background: #fff;
            border-radius: 8px;
        }
        /* Android 7: canvas 独立合成层，避免 GPU 下空白 */
        canvas {
            transform: translateZ(0);
        }
    </style>
</head>
<body>
<div id="qrcode-container"></div>

<script>
    var authorizeUrl = "https://passport.feishu.cn/suite/passport/oauth/authorize";
    var appId = "cli_a646a42958f2d00b";
    var redirectUri = "https://geapp.goldemperor.com:1226/Pages/FeiShu/FeiShuCallBack.aspx";
    var gotoUrl = authorizeUrl +
        "?client_id=" + appId +
        "&redirect_uri=" + encodeURIComponent(redirectUri) +
        "&response_type=code" +
        "&state=GOLD_EMPEROR";

    var qrObj = QRLogin({
        id: "qrcode-container",
        goto: gotoUrl,
        width: "250",
        height: "250",
        style: "border:none"
    });

    function handleMessage(event) {
        if (qrObj.matchOrigin(event.origin) && qrObj.matchData(event.data)) {
            var tmpCode = encodeURIComponent(event.data.tmp_code);
            window.location.href = gotoUrl + "&tmp_code=" + tmpCode;
        }
    }

    if (typeof window.addEventListener === "function") {
        window.addEventListener("message", handleMessage, false);
    } else if (typeof window.attachEvent === "function") {
        window.attachEvent("onmessage", handleMessage);
    }
</script>
</body>
</html>
