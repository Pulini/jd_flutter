<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书二维码登录</title>
    <script src="https://lf-package-cn.feishucdn.com/obj/feishu-static/lark/passport/qrcode/LarkSSOSDKWebQRCode-1.0.3.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            overflow: hidden;       /* 填满时禁止滚动 */
        }
        #qrcode-wrapper {
            width: 100vw;           /* 占满整个视口 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #qrcode-container {
            width: 250px;           /* 保持 SDK 原生尺寸，靠 scale 放大 */
            height: 250px;
            background: #fff;
            border-radius: 8px;
            transform-origin: center center;
        }
        /* Android 7: canvas 独立合成层，避免 GPU 下空白 */
        canvas {
            transform: translateZ(0);
        }
    </style>
</head>
<body>
<div id="qrcode-wrapper">
    <div id="qrcode-container"></div>
</div>

<script>
    var authorizeUrl = "https://passport.feishu.cn/suite/passport/oauth/authorize";
    var appId = "cli_a646a42958f2d00b";
    var redirectUri = "https://geapp.goldemperor.com:1226/Pages/FeiShu/FeiShuCallBack.aspx";
    var gotoUrl = authorizeUrl +
        "?client_id=" + appId +
        "&redirect_uri=" + encodeURIComponent(redirectUri) +
        "&response_type=code" +
        "&state=GOLD_EMPEROR";

    var qrObj = QRLogin({
        id: "qrcode-container",
        goto: gotoUrl,
        width: "250",
        height: "250",
        style: "border:none"
    });

    // 根据视口大小动态缩放二维码，使其填满页面
    function fitQR() {
        var container = document.getElementById("qrcode-container");
        // 取视口较短边，乘以系数（0.95 = 留一点边距，1 = 完全填满）
        var size = Math.min(window.innerWidth, window.innerHeight) * 0.95;
        var scale = size / 250;
        container.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", fitQR);
    fitQR();

    function handleMessage(event) {
        if (qrObj.matchOrigin(event.origin) && qrObj.matchData(event.data)) {
            var tmpCode = encodeURIComponent(event.data.tmp_code);
            window.location.href = gotoUrl + "&tmp_code=" + tmpCode;
        }
    }

    if (typeof window.addEventListener === "function") {
        window.addEventListener("message", handleMessage, false);
    } else if (typeof window.attachEvent === "function") {
        window.attachEvent("onmessage", handleMessage);
    }
</script>
</body>
</html>
